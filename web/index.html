    <main class="content">
      <header>
        <h2 id="page-title" data-i18n="nav_dashboard">Dashboard</h2>
      </header>

      <section id="dashboard" class="page">
        <div class="stats-grid">
          <div class="stat-card glass">
            <h3 data-i18n="stat_total_printers">Total</h3>
            <p class="value" id="stat-total">0</p>
          </div>
          <div class="stat-card glass">
            <h3 data-i18n="stat_shared_printers">Shared</h3>
            <p class="value" id="stat-shared">0</p>
          </div>
          <div class="stat-card glass">
            <h3 data-i18n="stat_today_jobs">Today</h3>
            <p class="value" id="stat-jobs">0</p>
          </div>
        </div>
      </section>

      <section id="printers" class="page hidden">
        <div class="section-header">
          <h3 data-i18n="local_printers">Local Printers</h3>
          <button class="btn btn-primary" id="refresh-printers" data-i18n="refresh">Refresh</button>
        </div>
        <div class="printer-grid" id="printer-list"></div>

        <!-- 共享打印机弹窗 -->
        <div id="share-modal" class="modal hidden">
          <div class="modal-card glass">
            <h3 id="share-modal-title">共享打印机</h3>
            <p id="share-modal-printer-name" style="color:var(--accent);font-weight:600;margin-bottom:16px;"></p>
            <div class="form-row" style="flex-direction:column;gap:10px;">
              <label style="font-size:13px;color:var(--text-muted);">访问密码（留空则不设置密码）</label>
              <input id="share-password-input" type="password" placeholder="输入密码（可选）" style="width:100%;" />
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end;">
              <button class="btn" id="share-modal-cancel">取消</button>
              <button class="btn btn-primary" id="share-modal-confirm">确认共享</button>
            </div>
          </div>
        </div>
      </section>

      <section id="client" class="page hidden">
        <div class="glass">
          <div class="section-header">
            <h3 data-i18n="client_title">Remote Devices</h3>
            <button class="btn" id="discover-devices" data-i18n="discover_devices">Auto Discover</button>
          </div>
          <div class="form-row">
            <input id="device-name" placeholder="Name" />
            <input id="device-address" placeholder="IP or hostname" />
            <input id="device-port" type="number" value="52333" />
            <button class="btn btn-primary" id="add-device" data-i18n="add_device">Add</button>
          </div>
          <div id="discovered-list" class="mt-20"></div>
          <div id="device-list" class="mt-20"></div>
        </div>
      </section>

      <section id="settings" class="page hidden">
        <div class="settings-shell">
          <div class="settings-body">
            <div class="settings-panel">
              <div class="settings-row">
                <div>
                  <div style="font-weight: 500;" data-i18n="nav_settings_lang">Language</div>
                  <div class="text-muted" style="font-size: 12px;">Choose your preferred display language.</div>
                </div>
                <div class="settings-inline" style="grid-column: span 2; justify-self: end;">
                  <select id="language-select" class="custom-select">
                    <option value="en-US" data-i18n="lang_en">English</option>
                    <option value="zh-CN" data-i18n="lang_zh_cn">简体中文</option>
                    <option value="zh-TW" data-i18n="lang_zh_tw">繁體中文</option>
                    <option value="ja" data-i18n="lang_ja">日本語</option>
                    <option value="ko" data-i18n="lang_ko">한국어</option>
                  </select>
                </div>
              </div>
              <div class="settings-row">
                <div>
                  <div style="font-weight: 500;" data-i18n="setting_log_level">日志级别</div>
                  <div class="text-muted" style="font-size: 12px;" data-i18n="setting_log_level_desc">日志文件保存在程序运行目录下的
                    lanPrint.log</div>
                </div>
                <div class="settings-inline" style="grid-column: span 2; justify-self: end;">
                  <select id="log-level-select">
                    <option value="debug">debug</option>
                    <option value="info">info</option>
                    <option value="warn">warn</option>
                    <option value="error">error</option>
                  </select>
                  <button class="btn btn-primary" id="save-settings-btn" data-i18n="save_settings">保存更改</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="notification-container"></div>

  <script src="static/js/app.js"></script>
</body>

</html>
